apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: insightreportsnapshots.insights.platform.example.com
spec:
  group: insights.platform.example.com
  names:
    kind: InsightReportSnapshot
    listKind: InsightReportSnapshotList
    plural: insightreportsnapshots
    singular: insightreportsnapshot
    shortNames:
      - irs
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - insightReportName
                - insightReportUID
                - analyzedAt
                - durationMillis
                - recommendations
              properties:
                insightReportName:
                  type: string
                insightReportUID:
                  type: string
                analyzedAt:
                  type: string
                  format: date-time
                durationMillis:
                  type: integer
                  minimum: 0
                recommendations:
                  type: string
      additionalPrinterColumns:
        - name: Report
          type: string
          jsonPath: .spec.insightReportName
        - name: Analyzed
          type: date
          jsonPath: .spec.analyzedAt
        - name: DurationMs
          type: integer
          jsonPath: .spec.durationMillis
