apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: insightreports.insights.platform.example.com
spec:
  group: insights.platform.example.com
  names:
    kind: InsightReport
    listKind: InsightReportList
    plural: insightreports
    singular: insightreport
    shortNames:
      - ir
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-validations:
                - rule: "self.llmProvider != 'azureOpenAI' || (has(self.azureEndpoint) && size(self.azureEndpoint) > 0 && has(self.azureDeployment) && size(self.azureDeployment) > 0)"
                  message: azureEndpoint and azureDeployment are required for azureOpenAI
                - rule: "self.llmProvider != 'ollama' || (has(self.ollamaEndpoint) && size(self.ollamaEndpoint) > 0 && has(self.ollamaModel) && size(self.ollamaModel) > 0)"
                  message: ollamaEndpoint and ollamaModel are required for ollama
              properties:
                namespaces:
                  type: array
                  items:
                    type: string
                prometheusURL:
                  type: string
                interval:
                  type: string
                  pattern: '^[0-9]+(s|m|h)$'
                llmProvider:
                  type: string
                  enum:
                    - azureOpenAI
                    - ollama
                  default: azureOpenAI
                azureEndpoint:
                  type: string
                azureDeployment:
                  type: string
                azureAPIVersion:
                  type: string
                ollamaEndpoint:
                  type: string
                ollamaModel:
                  type: string
                maxMetricSamples:
                  type: integer
                  minimum: 1
                  maximum: 4
                includeEvents:
                  type: boolean
                retentionDays:
                  type: integer
                  minimum: 1
                  maximum: 3650
                systemPrompt:
                  type: string
                  maxLength: 16384
                userPrompt:
                  type: string
                  maxLength: 32768
            status:
              type: object
              properties:
                observedAt:
                  type: string
                  format: date-time
                summary:
                  type: string
                recommendations:
                  type: string
                lastSnapshot:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Reason
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].reason
        - name: Observed
          type: date
          jsonPath: .status.observedAt
