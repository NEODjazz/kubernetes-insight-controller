name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/neodjazz/kubernetes-insight-controller

jobs:
  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare release metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build archives
        run: |
          set -eu
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            name="k8s-insight-controller_${{ steps.meta.outputs.version }}_${os}_${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -ldflags "-s -w -X k8s-insight-controller/internal/version.Version=${{ steps.meta.outputs.version }} -X k8s-insight-controller/internal/version.Commit=${{ steps.meta.outputs.commit }} -X k8s-insight-controller/internal/version.Date=${{ steps.meta.outputs.date }}" \
              -o "dist/${name}${ext}" ./cmd/manager
            tar -C dist -czf "dist/${name}.tar.gz" "${name}${ext}"
            rm "dist/${name}${ext}"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)

      - name: Build install manifest
        run: |
          set -eu
          awk 'FNR == 1 && NR != 1 { print "---" } { print }' \
            config/crd/bases/k8s-insights-platform.io_insightreports.yaml \
            config/crd/bases/k8s-insights-platform.io_insightreportsnapshots.yaml \
            config/manager/namespace.yaml \
            config/rbac/service_account.yaml \
            config/rbac/role.yaml \
            config/rbac/role_binding.yaml \
            config/manager/deployment.yaml \
            config/manager/service.yaml \
            config/manager/ingress.yaml \
            > dist/k8s-insight-controller.yaml

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/k8s-insight-controller.yaml

  image:
    name: Build and publish image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.date }}
